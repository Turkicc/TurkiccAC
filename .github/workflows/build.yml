name: Build plugin jar
on:
  push:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Unzip and build
        run: |
          ZIP=$(ls *.zip | head -1)
          unzip -o "$ZIP" -d _src
          POMDIR=$(dirname "$(find _src -name pom.xml | head -1)")
          cd "$POMDIR"
          mvn -B -U clean package
      - uses: actions/upload-artifact@v4
        with:
          name: SentinelAC-jar
          path: _src/**/target/*.jar
          if-no-files-found: error
