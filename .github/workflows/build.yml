name: Build TurkiccAC

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository source code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Set up Java 21 (Required for Minecraft 1.21.x development)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # Step 3: Grant execute permission to the Gradle wrapper
    - name: Setup Gradle Permissions
      run: chmod +x ./gradlew

    # Step 4: Build the project using Gradle
    - name: Build with Gradle
      run: ./gradlew build

    # Step 5: Upload the compiled .jar file as an artifact
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TurkiccAC-Jar
        path: build/libs/*.jar
