name: Build plugin jar

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Unzip and build
        run: |
          ZIP=$(ls *.zip | head -1)
          unzip -o "$ZIP" -d _src
          POMDIR=$(dirname "$(find _src -name pom.xml | head -1)")
          cd "$POMDIR"
          mvn -B -U clean package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name:
