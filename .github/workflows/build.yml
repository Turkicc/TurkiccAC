name: Build plugin jar

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Extract source zip
        shell: bash
        run: |
          set -euxo pipefail
          ZIP="$(find . -maxdepth 1 -type f -name '*.zip' -print -quit)"
          test -n "$ZIP"
          echo "Using zip: $ZIP"

          python3 - <<'PY'
          import zipfile, pathlib

          zip_path = next(pathlib.Path(".").glob("*.zip"))
          out = pathlib.Path("_src")
          out.mkdir(exist_ok=True)

          with zipfile.ZipFile(zip_path) as z:
              for info in z.infolist():
                  name = info.filename.replace("\\", "/")
                  if not name or name.endswith("/"):
                      continue
                  target = out / name
                  target.parent.mkdir(parents=True, exist_ok=True)
                  target.write_bytes(z.read(info))

          print("Extracted files:")
          for p in out.rglob("*"):
              print(p)
          PY

          POM="$(find _src -name pom.xml -print -quit)"
          test -n "$POM"
          echo "Using pom: $POM"

      - name: Build with Maven
        shell: bash
        run: |
          set -euxo pipefail
          POM="$(find _src -name pom.xml -print -quit)"
          POMDIR="$(dirname "$POM")"
          cd "$POMDIR"
          mvn -B -U clean package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: SentinelAC-jar
          path: _src/**/target/*.jar
          if-no-files-found: error
