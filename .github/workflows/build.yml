name: Build TurkiccAC

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out your repository code
    - name: Checkout Repository
      uses: actions/checkout@v4

    # Step 2: Set up Java 21 (Strictly required for Paper 1.21.1)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'gradle' # Automatically caches dependencies to speed up future builds

    # Step 3: Fix permissions for the Gradle build runner
    - name: Setup Gradle Permissions
      run: chmod +x ./gradlew

    # Step 4: Run the Gradle compile task
    - name: Build with Gradle
      run: ./gradlew build

    # Step 5: Locate and upload the final compiled .jar file
    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TurkiccAC-Jar
        path: build/libs/*.jar
