name: Build TurkiccAC

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    # This builds the project even if your pom.xml is hidden inside a subfolder
    - name: Build with Maven
      run: |
        POM_PATH=$(find . -name "pom.xml" | head -n 1)
        if [ -z "$POM_PATH" ]; then
          echo "ERROR: Could not find pom.xml anywhere in this repository!"
          exit 1
        fi
        echo "Found pom.xml at: $POM_PATH"
        mvn -f "$POM_PATH" clean package

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: TurkiccAC-Jar
        path: "**/target/*.jar"
