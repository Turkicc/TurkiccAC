name: Build plugin jar
   on:
     push:
     workflow_dispatch:
   jobs:
     build:
       runs-on: ubuntu-latest
       steps:
         - uses: actions/checkout@v4
         - uses: actions/setup-java@v4
           with:
             distribution: temurin
             java-version: '21'
             cache: maven
         - run: mvn -B -U clean package
         - uses: actions/upload-artifact@v4
           with:
             name: SentinelAC-jar
             path: target/*.jar
             if-no-files-found: error
