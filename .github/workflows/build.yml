name: Build plugin jar

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Unzip source
        run: unzip -o SentinelAC-fixed.zip -d _src

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Build with Maven
        working-directory: _src/anticheat
        run: mvn -B -U clean package

      - name: Upload jar
        uses: actions/upload-artifact@v4
        with:
          name: SentinelAC-jar
          path: _src/anticheat/target/*.jar
          if-no-files-found: error